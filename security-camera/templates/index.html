<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ camera_name }}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #ddd; font-family: system-ui, sans-serif; min-height: 100vh; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.5rem; background: #1a1a1a; border-bottom: 1px solid #333;
    flex-wrap: wrap; gap: .75rem;
  }
  header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: .03em; }
  header h1 span { color: #888; font-weight: 400; margin-left: .5rem; font-size: .95rem; }
  .date-nav { display: flex; align-items: center; gap: .5rem; }
  .date-nav input[type="date"] {
    background: #222; border: 1px solid #444; color: #ddd;
    padding: .35rem .6rem; border-radius: 4px; font-size: .9rem; cursor: pointer;
  }
  .date-nav a {
    color: #aaa; text-decoration: none; font-size: .85rem;
    padding: .35rem .7rem; border: 1px solid #444; border-radius: 4px;
  }
  .date-nav a:hover { background: #222; }
  main { padding: 1.5rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax({{ card_size }}px, 1fr)); gap: .75rem; }
  .card {
    background: #1a1a1a; border: 1px solid #2a2a2a;
    border-radius: 6px; overflow: hidden; transition: border-color .15s;
  }
  .card:hover { border-color: #555; }
  /* Still image card */
  .card.still a { display: block; }
  .card.still img { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
  /* Movie card */
  .card.movie video {
    width: 100%; aspect-ratio: 16/9; display: block; background: #000;
  }
  .card-info {
    padding: .45rem .6rem; font-size: .78rem; color: #888;
    display: flex; align-items: center; gap: .4rem;
  }
  .badge {
    font-size: .68rem; padding: .1rem .35rem; border-radius: 3px;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .badge-movie { background: #2a1f00; color: #c8900a; border: 1px solid #5a3d00; }
  .card-info { flex-wrap: wrap; }
  .card-size { width: 100%; font-size: .72rem; color: #555; padding: .1rem 0 .25rem; }
  .card-actions { display: flex; align-items: center; gap: .15rem; width: 100%; margin-top: .1rem; }
  .card-actions .card-size { margin-right: auto; }
  .btn-action {
    background: none; border: none; cursor: pointer; padding: 2px;
    opacity: .35; transition: opacity .15s; flex-shrink: 0; display: block; text-decoration: none;
  }
  .btn-action:hover { opacity: .75; }
  .btn-action svg { display: block; }
  .btn-action.fav-on { opacity: .8; }
  .empty { grid-column: 1 / -1; text-align: center; color: #555; padding: 4rem 0; font-size: 1rem; }
  #sentinel { height: 1px; }
  #loading { text-align: center; color: #555; font-size: .85rem; padding: 1.5rem 0; display: none; }
  .dates-bar {
    padding: .6rem 1.5rem; background: #141414; border-bottom: 1px solid #222;
    display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
  }
  .dates-bar h2 { font-size: .75rem; color: #555; text-transform: uppercase; letter-spacing: .08em; white-space: nowrap; }
  .dates-list { display: flex; flex-wrap: wrap; gap: .35rem; }
  .dates-list a {
    color: #aaa; text-decoration: none; font-size: .8rem;
    padding: .25rem .6rem; border: 1px solid #333; border-radius: 4px;
  }
  .dates-list a:hover, .dates-list a.active { background: #2a2a2a; border-color: #555; color: #eee; }
  .stats-bar {
    width: 100%; display: flex; gap: 1.25rem; flex-wrap: wrap;
    padding: .45rem 1.5rem; background: #141414; border-bottom: 1px solid #222;
    font-size: .78rem; color: #666;
  }
  .stats-bar span { white-space: nowrap; }
  .stats-bar strong { color: #999; font-weight: 500; }
</style>
</head>
<body>
<header>
  <h1>{{ camera_name }} <span>{{ title }}</span></h1>
  <div class="date-nav">
    <a href="/">Latest</a>
    <a href="/settings">Settings</a>
    <input type="date" id="date-picker" {% if selected_date %}value="{{ selected_date }}"{% endif %}>
  </div>
</header>
<div class="stats-bar">
  <span>Disk: <strong>{{ stats.disk_free_gb }} GB free</strong> ({{ stats.disk_free_pct }}%)</span>
  <span>RAM: <strong>{{ stats.ram_gb }} GB</strong></span>
  <span>CPU: <strong>{{ stats.cpu_ghz }} GHz</strong></span>
</div>
<div class="dates-bar">
  <h2>Browse by date</h2>
  <div class="dates-list" id="dates-list">
    <span style="color:#555;font-size:.8rem">Loading…</span>
  </div>
</div>
<main>
  <div class="grid" id="grid"></div>
  <div id="loading">Loading…</div>
  <div id="sentinel"></div>
</main>
<script>
  const PAGE = 8;
  const selectedDate = {{ selected_date | tojson }};
  let offset = 0;
  let loading = false;
  let exhausted = false;

  const grid = document.getElementById('grid');
  const loadingEl = document.getElementById('loading');
  const sentinel = document.getElementById('sentinel');

  const deleteIcon = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="9" cy="9" r="8" stroke="#aaa" stroke-width="1.5"/>
    <line x1="5.5" y1="5.5" x2="12.5" y2="12.5" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12.5" y1="5.5" x2="5.5" y2="12.5" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/>
  </svg>`;

  const downloadIcon = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="9" cy="9" r="8" stroke="#aaa" stroke-width="1.5"/>
    <line x1="9" y1="4.5" x2="9" y2="10.5" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/>
    <polyline points="6.5,8.5 9,12 11.5,8.5" stroke="#aaa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="5.5" y1="13.5" x2="12.5" y2="13.5" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/>
  </svg>`;

  const heartEmpty = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M9 13.5C9 13.5 3.5 10 3.5 6.5C3.5 4.6 4.9 3.5 6.5 3.5C7.6 3.5 8.5 4.1 9 4.9C9.5 4.1 10.4 3.5 11.5 3.5C13.1 3.5 14.5 4.6 14.5 6.5C14.5 10 9 13.5 9 13.5Z" stroke="#aaa" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>`;

  const heartFilled = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M9 13.5C9 13.5 3.5 10 3.5 6.5C3.5 4.6 4.9 3.5 6.5 3.5C7.6 3.5 8.5 4.1 9 4.9C9.5 4.1 10.4 3.5 11.5 3.5C13.1 3.5 14.5 4.6 14.5 6.5C14.5 10 9 13.5 9 13.5Z" fill="#e04060" stroke="#e04060" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>`;

  const FAVS_KEY = 'sc_favourites';
  function getFavs() { return new Set(JSON.parse(localStorage.getItem(FAVS_KEY) || '[]')); }
  function saveFavs(s) { localStorage.setItem(FAVS_KEY, JSON.stringify([...s])); }
  function isFav(path) { return getFavs().has(path); }

  async function syncFavs() {
    try {
      const res = await fetch('/api/favourites');
      const paths = await res.json();
      saveFavs(new Set(paths));
    } catch (e) {}
  }

  function toggleFav(btn, path) {
    const favs = getFavs();
    const wasOn = favs.has(path);
    wasOn ? favs.delete(path) : favs.add(path);
    saveFavs(favs);
    btn.classList.toggle('fav-on', !wasOn);
    btn.title = wasOn ? 'Favourite' : 'Unfavourite';
    btn.innerHTML = wasOn ? heartEmpty : heartFilled;
    fetch('/api/favourites', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({path, action: wasOn ? 'remove' : 'add'}),
    });
  }

  function fmtCardDate(d) {
    const [y, m, day] = d.split('-').map(Number);
    return new Date(y, m - 1, day).toLocaleDateString('en-US', { weekday: 'short', month: 'long', day: 'numeric', year: 'numeric' });
  }

  function makeCard(item) {
    const fav = isFav(item.path);
    const actions = `<span class="card-actions">
      <span class="card-size">${item.size}</span>
      <button class="btn-action ${fav ? 'fav-on' : ''}" title="${fav ? 'Unfavourite' : 'Favourite'}" onclick="toggleFav(this, '${item.path}')">${fav ? heartFilled : heartEmpty}</button>
      <a class="btn-action" href="/images/${item.path}" download title="Download">${downloadIcon}</a>
      <button class="btn-action" title="Delete" onclick="deleteItem(this, '${item.path}')">${deleteIcon}</button>
    </span>`;

    if (item.type === 'movie') {
      const poster = item.poster ? `poster="/images/${item.poster}"` : '';
      return `<div class="card movie">
        <video src="/images/${item.path}" controls preload="none" playsinline ${poster}></video>
        <div class="card-info">
          <span class="badge badge-movie">video</span>
          ${fmtCardDate(item.date)} &nbsp; ${item.time}
          ${actions}
        </div>
      </div>`;
    }
    return `<div class="card still">
      <a href="/images/${item.path}" target="_blank">
        <img src="/images/${item.path}" alt="${item.date} ${item.time}" loading="lazy">
      </a>
      <div class="card-info">
        ${fmtCardDate(item.date)} &nbsp; ${item.time}
        ${actions}
      </div>
    </div>`;
  }

  async function deleteItem(btn, path) {
    const card = btn.closest('.card');
    card.style.opacity = '.4';
    const res = await fetch(`/api/images/${path}`, { method: 'DELETE' });
    if (res.ok) {
      if (isFav(path)) {
        const favs = getFavs();
        favs.delete(path);
        saveFavs(favs);
      }
      card.remove();
    } else {
      card.style.opacity = '1';
      alert('Delete failed.');
    }
  }

  function sentinelVisible() {
    const rect = sentinel.getBoundingClientRect();
    return rect.top < window.innerHeight + 400;
  }

  async function loadMore() {
    if (loading || exhausted) return;
    loading = true;
    loadingEl.style.display = 'block';

    const url = selectedDate
      ? `/api/images?date=${selectedDate}&offset=${offset}&limit=${PAGE}`
      : `/api/images?offset=${offset}&limit=${PAGE}`;

    const data = await fetch(url).then(r => r.json());

    if (data.images.length === 0 && offset === 0) {
      grid.innerHTML = `<p class="empty">No captures found${selectedDate ? ' for ' + selectedDate : ''}.</p>`;
    } else {
      grid.insertAdjacentHTML('beforeend', data.images.map(makeCard).join(''));
    }

    offset += data.images.length;
    exhausted = !data.has_more;
    loading = false;
    loadingEl.style.display = 'none';

    if (!exhausted && sentinelVisible()) {
      loadMore();
    }
  }

  const observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) loadMore();
  }, { rootMargin: '400px' });

  document.getElementById('date-picker').addEventListener('change', function() {
    if (this.value) window.location.href = '/date/' + this.value;
  });

  fetch('/api/dates').then(r => r.json()).then(dates => {
    const el = document.getElementById('dates-list');
    if (!dates.length) { el.innerHTML = '<span style="color:#555;font-size:.82rem">No captures yet.</span>'; return; }
    el.innerHTML = dates.map(d =>
      `<a href="/date/${d}" class="${d === selectedDate ? 'active' : ''}">${fmtCardDate(d)}</a>`
    ).join('');
  });

  // Sync favourites from server before rendering any cards
  syncFavs().finally(() => observer.observe(sentinel));
</script>
</body>
</html>
